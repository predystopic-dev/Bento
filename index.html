<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Emerald Den</title>
		<link rel="shortcut icon" type="image/png" href="assets/icons/favicon.png" />
		<link rel="stylesheet" href="app.css" />
		<!-- Pinned Lucide version - latest removed brand icons (github, youtube, etc.) -->
		<script src="https://unpkg.com/lucide@0.259.0"></script>
	</head>

	<!--
      ╔╗ ╔═╗╔╗╔╔╦╗╔═╗
      ╠╩╗║╣ ║║║ ║ ║ ║
      ╚═╝╚═╝╝╚╝ ╩ ╚═╝
      -->

	<body class="">
		<button id="themeButton">
			<i id="themeIcon" icon-name="moon"></i>
		</button>

		<!-- Pokeball Easter Egg -->
		<div id="pokeball" title="Who's that Pokemon?">
			<div class="pokeball-top"></div>
			<div class="pokeball-center"><div class="pokeball-button"></div></div>
			<div class="pokeball-bottom"></div>
		</div>
		<div id="pokemon-toast"></div>

		<!-- Decorative Pokemon GIFs -->
		<img src="assets/pikachu-running-pikachu.gif" class="pokemon-deco pokemon-runner" alt="" />
		<img src="assets/snorlax-pixel.gif" class="pokemon-deco pokemon-snorlax" alt="" title="Snorlax is blocking the path!" />
		<img src="assets/pokemon-cleffa.gif" class="pokemon-deco pokemon-cleffa" alt="" title="Cleffa wants to be your friend!" />
		<img src="assets/mudkip-tiny.gif" class="pokemon-deco pokemon-mudkip" alt="" title="So I heard you like Mudkips..." />

		<div class="container">
			<!-- Clock and Greetings  -->

			<div class="timeBlock">
				<div class="clock">
					<div id="hour"></div>
					<div id="separator"></div>
					<div id="minutes"></div>
				</div>
				<div id="greetings"></div>
				<div id="pokemon-quote"></div>
			</div>

			<!-- Date and Weather  -->

			<div class="weatherBlock">
				<div class="date">
					<div id="month"></div>
					<div id="day"></div>
				</div>
				<div class="weather">
					<div class="weatherIcon">
						<img src="assets/icons/OneDark/unknown.png" />
					</div>
					<div class="weatherValue">
						<p>- °<span class="g">c</span></p>
					</div>
					<div class="weatherDescription">
						<p></p>
					</div>
				</div>
				<img src="assets/jirachi-pokémon.gif" class="weather-pokemon" alt="" title="Jirachi grants your weather wish!" />
			</div>

			<div class="linksBlock" id="linksBlock">
				<div class="linksBlockLeft" id="linksBlockLeft"></div>
				<div class="linksBlockRight" id="linksBlockRight"></div>
			</div>
		</div>

		<!-- Config  -->
		<script src="config.js"></script>

		<!-- Scripts  -->
		<script src="assets/js/layout.js"></script>
		<script src="assets/js/theme.js"></script>
		<script src="assets/js/time.js"></script>
		<script src="assets/js/greeting.js"></script>
		<script src="assets/js/weather.js"></script>

		<!-- Generators  -->
		<script src="assets/js/buttons.js"></script>
		<script src="assets/js/lists.js"></script>

		<!-- Icons -->
		<script>
			lucide.createIcons();
		</script>

		<!-- Pokemon Easter Eggs -->
		<script src="assets/js/pokemon.js"></script>
	</body>

	<!-- Developed and designed by Miguel Ávila: -->
	<!-- https://avila.sh-->
</html>
